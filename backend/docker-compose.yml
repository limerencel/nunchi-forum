version: "3.8"

services:
  db:
    image: postgres:14
    container_name: nunchi-forum_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nunchi_forum_db
      POSTGRES_USER: nunchi_user
      POSTGRES_PASSWORD: secure_password # TODO: Use a more secure method for production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql # For initial schema setup

volumes:
  postgres_data: